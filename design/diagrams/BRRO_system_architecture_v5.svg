<svg width="680" height="700" viewBox="0 0 680 700" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Blue Rock Radio Observatory — system architecture v5</title>
<desc>Full system architecture with correctly aligned signal chains. Chain B (science): Dish-Feed-Airspy-Pi3 aligned on x=136. Chain A (RFI): Dipole-V4c-Pi2 aligned on x=352. DDOEE and tripod boundaries shown.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  text { font-family: system-ui, -apple-system, sans-serif; }
  .th { font-size: 14px; font-weight: 500; fill: #2c2c2a; }
  .ts { font-size: 12px; font-weight: 400; fill: #5f5e5a; }
  .c-blue rect, .c-blue circle { fill: #e6f1fb; stroke: #185fa5; }
  .c-blue .th { fill: #0c447c; }
  .c-blue .ts { fill: #185fa5; }
  .c-teal rect, .c-teal circle { fill: #e1f5ee; stroke: #0f6e56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0f6e56; }
  .c-amber rect { fill: #faeeda; stroke: #854f0b; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854f0b; }
  .c-gray rect { fill: #f1efe8; stroke: #5f5e5a; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5f5e5a; }
  .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
</style>
</defs>

<!-- Background -->
<rect width="680" height="700" fill="#ffffff"/>

<!-- Zone label -->
<text class="ts" x="524" y="18">Indoors</text>
<line x1="512" y1="10" x2="512" y2="690" stroke="#d3d1c7" stroke-width="0.5" stroke-dasharray="5,4"/>

<!-- OUTER TRIPOD BOUNDARY -->
<rect x="28" y="28" width="468" height="584" rx="14" fill="none" stroke="#b4b2a9" stroke-width="0.8" stroke-dasharray="7,4"/>
<text class="ts" x="46" y="46">Tripod assembly</text>

<!-- Dish -->
<g class="c-blue">
  <rect x="56" y="58" width="160" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="136" y="78" text-anchor="middle" dominant-baseline="central">Discovery Dish</text>
  <text class="ts" x="136" y="95" text-anchor="middle" dominant-baseline="central">70cm parabolic</text>
</g>

<line x1="216" y1="83" x2="244" y2="83" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="230" y="74" text-anchor="middle">mount</text>

<!-- Drive -->
<g class="c-amber">
  <rect x="252" y="58" width="200" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="352" y="78" text-anchor="middle" dominant-baseline="central">Discovery Drive</text>
  <text class="ts" x="352" y="95" text-anchor="middle" dominant-baseline="central">AZ/EL · 0–90° · WiFi</text>
</g>

<line x1="452" y1="83" x2="524" y2="83" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="488" y="74" text-anchor="middle">WiFi — rotctl</text>

<!-- Feed -->
<line x1="136" y1="108" x2="136" y2="136" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="170" y="125">short coax</text>

<g class="c-blue">
  <rect x="56" y="136" width="160" height="90" rx="6" stroke-width="0.5"/>
  <text class="th" x="136" y="158" text-anchor="middle" dominant-baseline="central">HI Feed</text>
  <text class="ts" x="136" y="175" text-anchor="middle" dominant-baseline="central">1380–1460 MHz</text>
  <rect x="70" y="186" width="132" height="18" rx="3" fill="none" stroke="#185fa5" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="136" y="197" text-anchor="middle" dominant-baseline="central">LNA1 · SAW · LNA2 · SAW</text>
  <text class="ts" x="136" y="214" text-anchor="middle" dominant-baseline="central">IP65 · bias tee powered</text>
</g>

<!-- Dipole -->
<g class="c-teal">
  <rect x="252" y="136" width="200" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="352" y="156" text-anchor="middle" dominant-baseline="central">Dipole antenna</text>
  <text class="ts" x="352" y="173" text-anchor="middle" dominant-baseline="central">5.25cm per arm · 1420 MHz</text>
</g>

<!-- DDOEE -->
<rect x="36" y="256" width="452" height="332" rx="10" fill="none" stroke="#444441" stroke-width="1.2"/>
<text class="th" x="262" y="276" text-anchor="middle" style="fill:#444441">DDOEE enclosure (IP66)</text>

<line x1="136" y1="226" x2="136" y2="296" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="60" y="262">feed output cable</text>
<line x1="352" y1="186" x2="352" y2="296" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Airspy -->
<g class="c-blue">
  <rect x="56" y="296" width="160" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="136" y="316" text-anchor="middle" dominant-baseline="central">Airspy R2</text>
  <text class="ts" x="136" y="333" text-anchor="middle" dominant-baseline="central">12-bit · bias tee on</text>
</g>

<!-- V4c -->
<g class="c-teal">
  <rect x="252" y="296" width="200" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="352" y="316" text-anchor="middle" dominant-baseline="central">RTL-SDR V4c</text>
  <text class="ts" x="352" y="333" text-anchor="middle" dominant-baseline="central">8-bit · USB-C · bias tee off</text>
</g>

<line x1="136" y1="346" x2="136" y2="388" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="352" y1="346" x2="352" y2="388" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Pi 3 -->
<g class="c-blue">
  <rect x="56" y="388" width="160" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="136" y="408" text-anchor="middle" dominant-baseline="central">Raspberry Pi 3</text>
  <text class="ts" x="136" y="425" text-anchor="middle" dominant-baseline="central">EZRa · rotctl</text>
</g>

<!-- Pi 2 -->
<g class="c-teal">
  <rect x="252" y="388" width="200" height="50" rx="6" stroke-width="0.5"/>
  <text class="th" x="352" y="408" text-anchor="middle" dominant-baseline="central">Raspberry Pi 2</text>
  <text class="ts" x="352" y="425" text-anchor="middle" dominant-baseline="central">rtl_power · RFI logs</text>
</g>

<line x1="136" y1="438" x2="136" y2="480" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>
<line x1="352" y1="438" x2="352" y2="480" stroke="#888780" stroke-width="0.8" marker-end="url(#arrow)"/>

<!-- PoE splitter -->
<g class="c-gray">
  <rect x="56" y="480" width="420" height="66" rx="6" stroke-width="0.5"/>
  <text class="th" x="266" y="502" text-anchor="middle" dominant-baseline="central">PoE splitter</text>
  <text class="ts" x="266" y="519" text-anchor="middle" dominant-baseline="central">Powers all DDOEE components</text>
  <text class="ts" x="266" y="535" text-anchor="middle" dominant-baseline="central">Single PoE cable to house</text>
</g>

<line x1="476" y1="513" x2="524" y2="513" stroke="#2c2c2a" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="500" y="504" text-anchor="middle">PoE</text>

<!-- MacBook -->
<g class="c-gray">
  <rect x="524" y="58" width="140" height="468" rx="8" stroke-width="0.5"/>
  <text class="th" x="594" y="80" text-anchor="middle" dominant-baseline="central">MacBook Pro</text>
  <text class="ts" x="594" y="97" text-anchor="middle" dominant-baseline="central">macOS Sonoma</text>
  <rect x="540" y="112" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="126" text-anchor="middle" dominant-baseline="central">GQRX · RFI analysis</text>
  <rect x="540" y="140" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="154" text-anchor="middle" dominant-baseline="central">EZRa · GNU Radio</text>
  <rect x="540" y="168" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="182" text-anchor="middle" dominant-baseline="central">Stellarium</text>
  <rect x="540" y="196" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="210" text-anchor="middle" dominant-baseline="central">Python · Astropy</text>
  <rect x="540" y="224" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="238" text-anchor="middle" dominant-baseline="central">Git · VS Code</text>
  <rect x="540" y="252" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="266" text-anchor="middle" dominant-baseline="central">Zotero</text>
  <rect x="540" y="280" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="294" text-anchor="middle" dominant-baseline="central">Google Calendar</text>
  <rect x="540" y="308" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="322" text-anchor="middle" dominant-baseline="central">SSH to Pis</text>
  <rect x="540" y="336" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="350" text-anchor="middle" dominant-baseline="central">GitHub repository</text>
  <rect x="540" y="364" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="378" text-anchor="middle" dominant-baseline="central">Reading notes</text>
  <rect x="540" y="392" width="108" height="22" rx="4" fill="none" stroke="#888780" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text class="ts" x="594" y="406" text-anchor="middle" dominant-baseline="central">Session logs</text>
</g>

<!-- Physical log book -->
<g class="c-gray">
  <rect x="524" y="546" width="140" height="54" rx="8" stroke-width="0.5"/>
  <text class="th" x="594" y="566" text-anchor="middle" dominant-baseline="central">Physical log book</text>
  <text class="ts" x="594" y="584" text-anchor="middle" dominant-baseline="central">Indexed · dated · signed</text>
</g>
<line x1="594" y1="526" x2="594" y2="546" stroke="#b4b2a9" stroke-width="0.8" stroke-dasharray="3,3"/>

<!-- Legend -->
<rect x="28" y="624" width="468" height="60" rx="6" fill="none" stroke="#d3d1c7" stroke-width="0.5"/>
<text class="th" x="48" y="644" dominant-baseline="central">Legend</text>
<rect x="48" y="658" width="12" height="12" rx="2" fill="#e6f1fb" stroke="#185fa5" stroke-width="0.5"/>
<text class="ts" x="68" y="666" dominant-baseline="central">Chain B — science</text>
<rect x="210" y="658" width="12" height="12" rx="2" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text class="ts" x="230" y="666" dominant-baseline="central">Chain A — RFI monitor</text>
<rect x="372" y="658" width="12" height="12" rx="2" fill="#faeeda" stroke="#854f0b" stroke-width="0.5"/>
<text class="ts" x="392" y="666" dominant-baseline="central">Mount control — WiFi</text>

</svg>
