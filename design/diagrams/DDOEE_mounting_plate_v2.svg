<svg width="100%" viewBox="0 0 680 820" role="img" xmlns="http://www.w3.org/2000/svg">
<title>DDOEE mounting plate layout v2 — two Pi configuration</title>
<desc>315x200mm mounting plate showing Tycon PoE splitter bottom-left on DIN rail, VCELINK 1-to-2 ethernet switch centre-bottom, Raspberry Pi 3 centre-left, Raspberry Pi 2 centre-right, Airspy R2 top-centre-left, RTL-SDR V4c top-right, ADF4351 mid-right, 30dB attenuator inline above ADF4351. Cable gland at bottom centre with ethernet, HI feed coax and dipole entries. 5V distribution rail horizontal mid-plate. 12V exits right to Discovery Drive. Phase 2-3 architecture. Author: Steve Hawker BEng MBA FRAS, Blue Rock Radio Observatory, 2026-05-04.</desc>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
text { font-family: sans-serif; }
.th { font-size: 14px; font-weight: 500; fill: #333; }
.ts { font-size: 12px; fill: #666; }
.c-blue rect { fill: #e6f1fb; stroke: #185fa5; }
.c-blue text { fill: #0c447c; }
.c-teal rect { fill: #e1f5ee; stroke: #0f6e56; }
.c-teal text { fill: #085041; }
.c-green rect { fill: #eaf3de; stroke: #3b6d11; }
.c-green text { fill: #27500a; }
.c-amber rect { fill: #faeeda; stroke: #854f0b; }
.c-amber text { fill: #633806; }
.c-purple rect { fill: #eeedfe; stroke: #534ab7; }
.c-purple text { fill: #3c3489; }
.c-gray rect { fill: #f1efe8; stroke: #5f5e5a; }
.c-gray text { fill: #444441; }
</style>
</defs>

<!-- ── Title ── -->
<text class="th" x="340" y="22" text-anchor="middle" style="font-size:15px">DDOEE mounting plate — v2 two-Pi layout</text>
<text class="ts" x="340" y="38" text-anchor="middle">315 × 200mm · Phase 2–3 (Pi 3 + Pi 2) · cable gland bottom centre · Blue Rock Radio Observatory</text>
<text class="ts" x="340" y="52" text-anchor="middle" style="font-size:10px">Steve Hawker BEng MBA FRAS · 2026-05-04</text>

<!-- ── Mounting plate outline ── -->
<rect x="75" y="58" width="530" height="680" rx="6" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="6,4"/>
<text class="ts" x="340" y="74" text-anchor="middle" style="fill:#aaa">315 × 200mm mounting plate (portrait, scaled for clarity)</text>

<!-- ══════════════════════════════════════
     CABLE GLAND ENTRY — bottom centre
     ══════════════════════════════════════ -->
<rect x="270" y="700" width="140" height="26" rx="4" fill="#f5f4f0" stroke="#888" stroke-width="0.5"/>
<text class="ts" x="340" y="717" text-anchor="middle">cable gland entry</text>
<circle cx="295" cy="713" r="4" fill="none" stroke="#185fa5" stroke-width="1.5"/>
<circle cx="322" cy="713" r="4" fill="none" stroke="#1a6e1a" stroke-width="1.5"/>
<circle cx="358" cy="713" r="4" fill="none" stroke="#854f0b" stroke-width="1.5"/>
<text class="ts" x="295" y="742" text-anchor="middle" style="fill:#185fa5">eth</text>
<text class="ts" x="322" y="742" text-anchor="middle" style="fill:#1a6e1a">HI</text>
<text class="ts" x="358" y="742" text-anchor="middle" style="fill:#854f0b">dip</text>

<!-- ══════════════════════════════════════
     TYCON PoE SPLITTER — bottom left, DIN rail
     ══════════════════════════════════════ -->
<g class="c-blue">
  <rect x="85" y="560" width="190" height="130" rx="4" stroke-width="0.5"/>
  <text class="th" x="180" y="612" text-anchor="middle">Tycon PoE splitter</text>
  <text class="ts" x="180" y="630" text-anchor="middle">POE-SPLT-BT-UNI-P</text>
  <text class="ts" x="180" y="648" text-anchor="middle">eth IN · 5V · 12V out</text>
</g>
<rect x="85" y="686" width="190" height="4" rx="2" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
<text class="ts" x="180" y="698" text-anchor="middle" style="fill:#aaa">DIN rail</text>

<!-- ══════════════════════════════════════
     VCELINK ETHERNET SWITCH — bottom centre
     ══════════════════════════════════════ -->
<g class="c-gray">
  <rect x="290" y="578" width="116" height="92" rx="4" stroke-width="0.5"/>
  <text class="th" x="348" y="614" text-anchor="middle">VCELINK M242</text>
  <text class="ts" x="348" y="632" text-anchor="middle">1→2 eth switch</text>
  <text class="ts" x="348" y="650" text-anchor="middle">USB-C powered</text>
</g>

<!-- ══════════════════════════════════════
     5V DISTRIBUTION RAIL
     ══════════════════════════════════════ -->
<rect x="85" y="390" width="495" height="18" rx="3" fill="none" stroke="#1a6e1a" stroke-width="0.8" stroke-dasharray="6,3"/>
<text class="ts" x="90" y="404" style="fill:#1a6e1a">5V distribution rail</text>

<!-- ══════════════════════════════════════
     RASPBERRY PI 3 — centre-left
     ══════════════════════════════════════ -->
<g class="c-teal">
  <rect x="155" y="430" width="165" height="100" rx="4" stroke-width="0.5"/>
  <text class="th" x="238" y="472" text-anchor="middle">Raspberry Pi 3</text>
  <text class="ts" x="238" y="490" text-anchor="middle">Chain B · science</text>
  <text class="ts" x="238" y="507" text-anchor="middle">Airspy · rotctl · ADF4351</text>
</g>

<!-- ══════════════════════════════════════
     RASPBERRY PI 2 — centre-right
     ══════════════════════════════════════ -->
<g class="c-teal">
  <rect x="360" y="430" width="165" height="100" rx="4" stroke-width="0.5"/>
  <text class="th" x="443" y="472" text-anchor="middle">Raspberry Pi 2</text>
  <text class="ts" x="443" y="490" text-anchor="middle">Chain A · RFI</text>
  <text class="ts" x="443" y="507" text-anchor="middle">V4c · rtl_power</text>
</g>

<!-- ══════════════════════════════════════
     AIRSPY R2 — top centre-left
     ══════════════════════════════════════ -->
<g class="c-green">
  <rect x="155" y="200" width="165" height="60" rx="4" stroke-width="0.5"/>
  <text class="th" x="238" y="226" text-anchor="middle">Airspy R2</text>
  <text class="ts" x="238" y="244" text-anchor="middle">Chain B · science SDR</text>
</g>

<!-- ══════════════════════════════════════
     RTL-SDR V4c — top right
     ══════════════════════════════════════ -->
<g class="c-amber">
  <rect x="375" y="200" width="165" height="60" rx="4" stroke-width="0.5"/>
  <text class="th" x="458" y="226" text-anchor="middle">RTL-SDR V4c</text>
  <text class="ts" x="458" y="244" text-anchor="middle">Chain A · RFI SDR</text>
</g>

<!-- ══════════════════════════════════════
     ADF4351 — mid right
     ══════════════════════════════════════ -->
<g class="c-purple">
  <rect x="420" y="318" width="130" height="94" rx="4" stroke-width="0.5"/>
  <text class="th" x="485" y="356" text-anchor="middle">ADF4351</text>
  <text class="ts" x="485" y="374" text-anchor="middle">RF signal source</text>
  <text class="ts" x="485" y="391" text-anchor="middle">SPI via Pi 3 GPIO</text>
</g>

<!-- ══════════════════════════════════════
     30dB ATTENUATOR — inline above ADF4351
     ══════════════════════════════════════ -->
<g class="c-gray">
  <rect x="420" y="276" width="130" height="34" rx="4" stroke-width="0.5"/>
  <text class="th" x="485" y="298" text-anchor="middle">30 dB attenuator</text>
</g>

<!-- ══════════════════════════════════════
     CABLE ROUTING
     ══════════════════════════════════════ -->

<!-- Ethernet: gland → Tycon IN -->
<path d="M295 700 L295 690 L180 690 L180 690" fill="none" stroke="#185fa5" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="130" y="686" text-anchor="end" style="fill:#185fa5">eth IN</text>

<!-- Tycon PoE OUT → VCELINK IN -->
<path d="M275 610 L290 610" fill="none" stroke="#185fa5" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- VCELINK OUT 1 → Pi 3 -->
<path d="M325 578 L325 558 L238 558 L238 530" fill="none" stroke="#185fa5" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- VCELINK OUT 2 → Pi 2 -->
<path d="M355 578 L355 558 L443 558 L443 530" fill="none" stroke="#185fa5" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

<!-- 5V from Tycon → rail -->
<path d="M180 560 L180 408" fill="none" stroke="#1a6e1a" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- 5V rail → Pi 3 -->
<path d="M238 408 L238 430" fill="none" stroke="#1a6e1a" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="243" y="423" style="fill:#1a6e1a">5V</text>

<!-- 5V rail → Pi 2 -->
<path d="M443 408 L443 430" fill="none" stroke="#1a6e1a" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="448" y="423" style="fill:#1a6e1a">5V</text>

<!-- 5V rail → Airspy R2 -->
<path d="M238 390 L238 260" fill="none" stroke="#1a6e1a" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

<!-- 5V rail → V4c -->
<path d="M458 390 L458 260" fill="none" stroke="#1a6e1a" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

<!-- 5V rail → ADF4351 -->
<path d="M485 390 L485 318" fill="none" stroke="#1a6e1a" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

<!-- 5V rail → VCELINK USB-C -->
<path d="M348 390 L348 578" fill="none" stroke="#1a6e1a" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
<text class="ts" x="353" y="500" style="fill:#1a6e1a">5V</text>

<!-- 12V → Discovery Drive (external) -->
<path d="M275 625 L580 625" fill="none" stroke="#854f0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text class="ts" x="545" y="618" style="fill:#854f0b">12V</text>
<text class="ts" x="545" y="634" style="fill:#854f0b">→ Drive</text>

<!-- HI feed coax: gland → Airspy R2 SMA -->
<path d="M322 700 L322 688 L238 688 L238 558 L238 260" fill="none" stroke="#1a6e1a" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="140" y="570" text-anchor="end" style="fill:#1a6e1a">HI feed</text>
<text class="ts" x="140" y="584" text-anchor="end" style="fill:#1a6e1a">coax</text>

<!-- Dipole coax: gland → V4c SMA -->
<path d="M358 700 L358 688 L458 688 L458 558 L458 260" fill="none" stroke="#854f0b" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="600" y="670" style="fill:#854f0b">dipole</text>
<text class="ts" x="600" y="684" style="fill:#854f0b">coax</text>

<!-- USB: Pi 3 → Airspy R2 -->
<path d="M238 430 L238 260" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="145" y="350" text-anchor="end" style="fill:#0F6E56">USB</text>

<!-- USB: Pi 2 → V4c -->
<path d="M443 430 L443 260" fill="none" stroke="#854f0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
<text class="ts" x="600" y="350" style="fill:#854f0b">USB</text>

<!-- GPIO/SPI: Pi 3 → ADF4351 -->
<path d="M320 470 L420 470 L420 365" fill="none" stroke="#534ab7" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
<text class="ts" x="370" y="462" text-anchor="middle" style="fill:#534ab7">GPIO/SPI</text>

<!-- ADF4351 SMA → 30dB attenuator -->
<path d="M485 318 L485 310" fill="none" stroke="#534ab7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- Attenuator → V4c SMA -->
<path d="M485 276 L485 266 L458 266 L458 260" fill="none" stroke="#534ab7" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="600" y="290" style="fill:#534ab7">SMA→att→V4c</text>

<!-- ══════════════════════════════════════
     ORIENTATION AND LEGEND
     ══════════════════════════════════════ -->
<text class="ts" x="340" y="758" text-anchor="middle" style="fill:#aaa">↑ top of enclosure (lid hinge)   ↓ bottom (cable gland entry)</text>

<rect x="75" y="766" width="530" height="46" rx="4" fill="none" stroke="#ccc" stroke-width="0.5"/>
<line x1="90" y1="782" x2="112" y2="782" stroke="#185fa5" stroke-width="1.5" stroke-dasharray="5,3"/>
<text class="ts" x="117" y="786">Ethernet</text>
<line x1="178" y1="782" x2="200" y2="782" stroke="#1a6e1a" stroke-width="2"/>
<text class="ts" x="205" y="786">HI feed / 5V pwr</text>
<line x1="285" y1="782" x2="307" y2="782" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="5,3"/>
<text class="ts" x="312" y="786">USB</text>
<line x1="348" y1="782" x2="370" y2="782" stroke="#534ab7" stroke-width="1.2" stroke-dasharray="4,3"/>
<text class="ts" x="375" y="786">GPIO/SPI/SMA cal</text>
<line x1="462" y1="782" x2="484" y2="782" stroke="#854f0b" stroke-width="2"/>
<text class="ts" x="489" y="786">Dipole / 12V</text>
<line x1="90" y1="802" x2="112" y2="802" stroke="#1a6e1a" stroke-width="0.8" stroke-dasharray="6,3"/>
<text class="ts" x="117" y="806">5V distribution rail (dashed green rect)</text>

</svg>
