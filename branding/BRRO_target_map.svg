<svg width="680" height="720" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Blue Rock Radio Observatory — target vector map</title>
<desc>Voyager-plaque style vector map showing Earth at centre with vectors to all observatory targets, scaled logarithmically by distance. Annotated with the hydrogen line frequency 1420.405 MHz.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Background — deep lapis blue -->
<rect x="0" y="0" width="680" height="720" fill="#042C53"/>

<!-- Pyrite flecks -->
<circle cx="85" cy="120" r="1.5" fill="#EF9F27" opacity="0.4"/>
<circle cx="142" cy="67" r="1" fill="#FAC775" opacity="0.3"/>
<circle cx="580" cy="95" r="2" fill="#EF9F27" opacity="0.35"/>
<circle cx="612" cy="200" r="1" fill="#FAC775" opacity="0.25"/>
<circle cx="55" cy="450" r="1.5" fill="#EF9F27" opacity="0.3"/>
<circle cx="628" cy="520" r="2" fill="#FAC775" opacity="0.4"/>
<circle cx="95" cy="620" r="1" fill="#EF9F27" opacity="0.3"/>
<circle cx="590" cy="650" r="1.5" fill="#FAC775" opacity="0.35"/>
<circle cx="320" cy="40" r="1" fill="#EF9F27" opacity="0.25"/>
<circle cx="480" cy="680" r="1.5" fill="#EF9F27" opacity="0.3"/>
<circle cx="160" cy="580" r="1" fill="#FAC775" opacity="0.2"/>
<circle cx="520" cy="150" r="1" fill="#EF9F27" opacity="0.25"/>
<circle cx="430" cy="600" r="1" fill="#FAC775" opacity="0.3"/>
<circle cx="70" cy="300" r="1.5" fill="#EF9F27" opacity="0.25"/>
<circle cx="610" cy="380" r="1" fill="#FAC775" opacity="0.3"/>
<circle cx="200" cy="160" r="1" fill="#EF9F27" opacity="0.2"/>
<circle cx="560" cy="440" r="1.5" fill="#FAC775" opacity="0.25"/>

<!-- Logarithmic distance rings -->
<circle cx="340" cy="380" r="40" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="80" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="120" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="160" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="200" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="240" fill="none" stroke="#185FA5" stroke-width="0.3" stroke-dasharray="2,5" opacity="0.3"/>

<!-- Ring distance labels -->
<text x="382" y="344" font-family="monospace" font-size="9" fill="#378ADD" opacity="0.7">0.1 kpc</text>
<text x="382" y="304" font-family="monospace" font-size="9" fill="#378ADD" opacity="0.7">1 kpc</text>
<text x="382" y="264" font-family="monospace" font-size="9" fill="#378ADD" opacity="0.7">10 kpc</text>
<text x="382" y="224" font-family="monospace" font-size="9" fill="#378ADD" opacity="0.7">100 kpc</text>
<text x="382" y="184" font-family="monospace" font-size="9" fill="#378ADD" opacity="0.7">1000 kpc</text>

<!-- Earth at centre -->
<circle cx="340" cy="380" r="7" fill="#185FA5" stroke="#85B7EB" stroke-width="1"/>
<circle cx="340" cy="380" r="3" fill="#5DCAA5"/>
<text x="350" y="396" font-family="monospace" font-size="10" fill="#85B7EB">Earth</text>

<!-- Cas A — 3.4 kpc — upper left -->
<line x1="340" y1="380" x2="292" y2="332" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.9"/>
<circle cx="292" cy="332" r="4" fill="#EF9F27" opacity="0.9"/>
<text x="240" y="325" font-family="monospace" font-size="11" fill="#FAC775">Cas A</text>
<text x="240" y="337" font-family="monospace" font-size="9" fill="#EF9F27" opacity="0.8">3.4 kpc</text>
<text x="240" y="349" font-family="monospace" font-size="8" fill="#FAC775" opacity="0.6">calibrator</text>

<!-- M1 Crab — 2.0 kpc — right upper -->
<line x1="340" y1="380" x2="377" y2="343" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.9"/>
<circle cx="377" cy="343" r="4" fill="#EF9F27" opacity="0.9"/>
<text x="384" y="335" font-family="monospace" font-size="11" fill="#FAC775">M1</text>
<text x="384" y="347" font-family="monospace" font-size="9" fill="#EF9F27" opacity="0.8">2.0 kpc</text>
<text x="384" y="359" font-family="monospace" font-size="8" fill="#FAC775" opacity="0.6">calibrator</text>

<!-- Complex C — 10 kpc — left -->
<line x1="340" y1="380" x2="260" y2="380" stroke="#5DCAA5" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.9"/>
<circle cx="260" cy="380" r="4" fill="#5DCAA5" opacity="0.9"/>
<text x="160" y="373" font-family="monospace" font-size="11" fill="#5DCAA5">Complex C</text>
<text x="170" y="385" font-family="monospace" font-size="9" fill="#5DCAA5" opacity="0.8">~10 kpc</text>
<text x="175" y="397" font-family="monospace" font-size="8" fill="#5DCAA5" opacity="0.6">HVC — Galactic halo</text>

<!-- Galactic centre — 8.5 kpc — lower left -->
<line x1="340" y1="380" x2="286" y2="434" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.7"/>
<circle cx="286" cy="434" r="3" fill="#5DCAA5" opacity="0.7"/>
<text x="195" y="443" font-family="monospace" font-size="10" fill="#5DCAA5" opacity="0.8">Galactic centre</text>
<text x="210" y="455" font-family="monospace" font-size="9" fill="#5DCAA5" opacity="0.6">8.5 kpc</text>
<text x="210" y="467" font-family="monospace" font-size="8" fill="#5DCAA5" opacity="0.5">low elevation target</text>

<!-- M31 — 785 kpc — upper centre-left -->
<line x1="340" y1="380" x2="313" y2="226" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.95"/>
<circle cx="313" cy="226" r="6" fill="#185FA5" stroke="#85B7EB" stroke-width="1"/>
<!-- M31 double horn mini profile -->
<polyline points="303,215 306,214 308,210 310,202 312,214 314,214 316,202 318,210 320,214 323,215" fill="none" stroke="#85B7EB" stroke-width="1.2"/>
<text x="255" y="210" font-family="monospace" font-size="12" fill="#85B7EB">M31</text>
<text x="255" y="223" font-family="monospace" font-size="9" fill="#85B7EB" opacity="0.8">785 kpc</text>
<text x="237" y="235" font-family="monospace" font-size="8" fill="#85B7EB" opacity="0.6">primary science target</text>

<!-- M33 — 840 kpc — upper right -->
<line x1="340" y1="380" x2="394" y2="232" stroke="#85B7EB" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.8"/>
<circle cx="394" cy="232" r="4" fill="#185FA5" stroke="#85B7EB" stroke-width="0.8" opacity="0.8"/>
<text x="402" y="225" font-family="monospace" font-size="11" fill="#85B7EB" opacity="0.85">M33</text>
<text x="402" y="237" font-family="monospace" font-size="9" fill="#85B7EB" opacity="0.65">840 kpc</text>
<text x="402" y="249" font-family="monospace" font-size="8" fill="#85B7EB" opacity="0.5">secondary target</text>

<!-- M81 — 3700 kpc — upper slight right -->
<line x1="340" y1="380" x2="356" y2="198" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.6"/>
<circle cx="356" cy="198" r="3" fill="#AFA9EC" opacity="0.6"/>
<text x="362" y="192" font-family="monospace" font-size="10" fill="#AFA9EC" opacity="0.7">M81</text>
<text x="362" y="204" font-family="monospace" font-size="8" fill="#AFA9EC" opacity="0.5">3700 kpc — stretch goal</text>

<!-- HI frequency annotation — Voyager style top left -->
<line x1="40" y1="80" x2="220" y2="80" stroke="#EF9F27" stroke-width="0.8"/>
<line x1="40" y1="75" x2="40" y2="85" stroke="#EF9F27" stroke-width="0.8"/>
<line x1="220" y1="75" x2="220" y2="85" stroke="#EF9F27" stroke-width="0.8"/>
<!-- Hydrogen atom spin flip diagram -->
<circle cx="80" cy="58" r="8" fill="none" stroke="#EF9F27" stroke-width="0.8"/>
<line x1="80" y1="50" x2="80" y2="40" stroke="#EF9F27" stroke-width="0.8"/>
<circle cx="175" cy="58" r="8" fill="none" stroke="#EF9F27" stroke-width="0.8"/>
<line x1="175" y1="50" x2="175" y2="40" stroke="#EF9F27" stroke-width="0.8"/>
<path d="M76 44 Q80 38 84 44" fill="none" stroke="#EF9F27" stroke-width="0.8"/>
<path d="M179 44 Q175 38 171 44" fill="none" stroke="#EF9F27" stroke-width="0.8"/>
<text x="118" y="55" font-family="monospace" font-size="12" fill="#EF9F27">→</text>
<text x="40" y="96" font-family="monospace" font-size="10" fill="#EF9F27">1420.405752 MHz</text>
<text x="40" y="109" font-family="monospace" font-size="9" fill="#EF9F27" opacity="0.7">hydrogen hyperfine transition</text>

<!-- Legend -->
<rect x="450" y="420" width="205" height="155" rx="4" fill="#042C53" stroke="#185FA5" stroke-width="0.5" opacity="0.9"/>
<text x="462" y="440" font-family="monospace" font-size="10" fill="#85B7EB">legend</text>
<line x1="462" y1="453" x2="492" y2="453" stroke="#EF9F27" stroke-width="1.2"/>
<circle cx="492" cy="453" r="3" fill="#EF9F27"/>
<text x="500" y="457" font-family="monospace" font-size="9" fill="#FAC775">calibration standard</text>
<line x1="462" y1="470" x2="492" y2="470" stroke="#5DCAA5" stroke-width="1.2"/>
<circle cx="492" cy="470" r="3" fill="#5DCAA5"/>
<text x="500" y="474" font-family="monospace" font-size="9" fill="#5DCAA5">Galactic target</text>
<line x1="462" y1="487" x2="492" y2="487" stroke="#85B7EB" stroke-width="1.5"/>
<circle cx="492" cy="487" r="4" fill="#185FA5" stroke="#85B7EB" stroke-width="1"/>
<text x="500" y="491" font-family="monospace" font-size="9" fill="#85B7EB">extragalactic target</text>
<line x1="462" y1="504" x2="492" y2="504" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="4,2"/>
<circle cx="492" cy="504" r="3" fill="#AFA9EC" opacity="0.6"/>
<text x="500" y="508" font-family="monospace" font-size="9" fill="#AFA9EC" opacity="0.7">stretch goal</text>
<line x1="462" y1="521" x2="492" y2="521" stroke="#378ADD" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<text x="500" y="525" font-family="monospace" font-size="9" fill="#378ADD" opacity="0.7">distance ring (log scale)</text>
<text x="462" y="545" font-family="monospace" font-size="8" fill="#378ADD" opacity="0.6">radial scale: logarithmic</text>
<text x="462" y="557" font-family="monospace" font-size="8" fill="#378ADD" opacity="0.6">rings: 0.1, 1, 10, 100, 1000 kpc</text>
<text x="462" y="569" font-family="monospace" font-size="8" fill="#378ADD" opacity="0.5">epoch: 2026.0</text>

<!-- Observatory identification — bottom -->
<line x1="40" y1="658" x2="640" y2="658" stroke="#185FA5" stroke-width="0.5" opacity="0.5"/>
<text x="340" y="676" font-family="monospace" font-size="13" fill="#85B7EB" text-anchor="middle" font-weight="500">BLUE ROCK RADIO OBSERVATORY</text>
<text x="340" y="693" font-family="monospace" font-size="10" fill="#378ADD" text-anchor="middle">Blue Rock Court · San Jose · California · 37.3382°N 121.8863°W</text>
<text x="340" y="708" font-family="monospace" font-size="9" fill="#EF9F27" text-anchor="middle" opacity="0.8">f = 1420.405752 MHz · λ = 21.106 cm</text>

</svg>
