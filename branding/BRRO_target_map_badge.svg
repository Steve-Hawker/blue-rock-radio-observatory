<svg width="444" height="444" viewBox="117.8 157.8 444.4 444.4" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Blue Rock Radio Observatory — target vector map</title>
<desc>Seven vectors radiating from Earth to observatory targets, on lapis lazuli blue with gold pyrite flecks. Logarithmic distance scale.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Background — deep lapis blue -->
<rect x="117.8" y="157.8" width="444.4" height="444.4" fill="#042C53"/>

<!-- Pyrite flecks — within cropped area -->
<circle cx="160" cy="200" r="1.5" fill="#EF9F27" opacity="0.4"/>
<circle cx="490" cy="185" r="1.5" fill="#EF9F27" opacity="0.35"/>
<circle cx="520" cy="320" r="1" fill="#FAC775" opacity="0.25"/>
<circle cx="140" cy="450" r="1.5" fill="#EF9F27" opacity="0.3"/>
<circle cx="530" cy="530" r="1.5" fill="#FAC775" opacity="0.35"/>
<circle cx="155" cy="555" r="1" fill="#EF9F27" opacity="0.3"/>
<circle cx="500" cy="560" r="1" fill="#FAC775" opacity="0.3"/>
<circle cx="290" cy="170" r="1" fill="#EF9F27" opacity="0.25"/>
<circle cx="430" cy="575" r="1" fill="#FAC775" opacity="0.25"/>
<circle cx="180" cy="520" r="1" fill="#FAC775" opacity="0.2"/>
<circle cx="505" cy="210" r="1" fill="#EF9F27" opacity="0.25"/>
<circle cx="410" cy="590" r="1" fill="#FAC775" opacity="0.3"/>
<circle cx="135" cy="340" r="1" fill="#EF9F27" opacity="0.25"/>
<circle cx="540" cy="420" r="1" fill="#FAC775" opacity="0.25"/>
<circle cx="210" cy="185" r="1" fill="#EF9F27" opacity="0.2"/>

<!-- Logarithmic distance rings -->
<circle cx="340" cy="380" r="40" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="80" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="120" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="160" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>
<circle cx="340" cy="380" r="200" fill="none" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3,4" opacity="0.5"/>

<!-- Cas A — 3.4 kpc — upper left -->
<line x1="340" y1="380" x2="292" y2="332" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.9"/>

<!-- M1 Crab — 2.0 kpc — right upper -->
<line x1="340" y1="380" x2="377" y2="343" stroke="#EF9F27" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.9"/>

<!-- Complex C — 10 kpc — left -->
<line x1="340" y1="380" x2="260" y2="380" stroke="#5DCAA5" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.9"/>

<!-- Galactic centre — 8.5 kpc — lower left -->
<line x1="340" y1="380" x2="286" y2="434" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)" opacity="0.7"/>

<!-- M31 — 785 kpc — upper centre-left -->
<line x1="340" y1="380" x2="313" y2="226" stroke="#85B7EB" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.95"/>

<!-- M33 — 840 kpc — upper right -->
<line x1="340" y1="380" x2="394" y2="232" stroke="#85B7EB" stroke-width="1.2" marker-end="url(#arrow)" opacity="0.8"/>

<!-- M81 — 3700 kpc — upper slight right -->
<line x1="340" y1="380" x2="356" y2="198" stroke="#AFA9EC" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)" opacity="0.6"/>

<!-- Earth — intersection dot -->
<circle cx="340" cy="380" r="4" fill="#85B7EB"/>

</svg>
